<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>המשפחות שלנו</title>
  <style>
    :root{
      --bg:#f5f2ec;
      --card:#ffffff;
      --text:#20242a;
      --muted:#6b7280;
      --accent:#236f78;
      --accent-dark:#17545b;
      --border:rgba(32,36,42,.14);
      --shadow:0 16px 44px rgba(0,0,0,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,"Noto Sans Hebrew",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    main{
      width:min(1050px,100%);
      margin:auto;
      padding:36px 18px 48px;
    }
    header{
      text-align:center;
      margin-bottom:28px;
    }
    h1{
      margin:0;
      font-size:clamp(2rem,5vw,3.4rem);
    }
    .subtitle{
      margin:10px 0 0;
      color:var(--muted);
      font-size:1.05rem;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
    }
    .card{
      display:block;
      text-decoration:none;
      color:inherit;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .card:hover,.card:focus-visible{
      transform:translateY(-4px);
      box-shadow:0 22px 52px rgba(0,0,0,.16);
      outline:none;
    }
    .thumb{
      aspect-ratio:16/10;
      background:linear-gradient(135deg,#dfe9e8,#eee5da);
      display:grid;
      place-items:center;
      font-size:4rem;
    }
    .content{
      padding:18px;
    }
    .content h2{
      margin:0 0 6px;
      font-size:1.35rem;
    }
    .content p{
      margin:0;
      color:var(--muted);
    }
    .button{
      display:inline-block;
      margin-top:14px;
      padding:9px 14px;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      font-weight:700;
    }
    .card:hover .button{
      background:var(--accent-dark);
    }
    footer{
      text-align:center;
      color:var(--muted);
      margin-top:28px;
      font-size:.92rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>המשפחות שלנו</h1>
      <p class="subtitle">בחרו משפחה כדי לפתוח את התמונה האינטראקטיבית</p>
    </header>

    <section class="grid">
      <a class="card" href="./finkelstein/">
        <div class="thumb" aria-hidden="true">👨‍👩‍👧‍👦</div>
        <div class="content">
          <h2>משפחת פינקלשטיין</h2>
          <p>לחצו לצפייה בתמונה ובפרטי בני המשפחה.</p>
          <span class="button">פתיחת המשפחה</span>
        </div>
      </a>
    </section>
 <section class="grid">
      <a class="card" href="./margolis/">
        <div class="thumb" aria-hidden="true">👨‍👩‍👧‍👦</div>
        <div class="content">
          <h2>משפחת מרגוליס</h2>
          <p>לחצו לצפייה בתמונה ובפרטי בני המשפחה.</p>
          <span class="button">פתיחת המשפחה</span>
        </div>
      </a>
    </section>
    <footer>משפחות נוספות יתווספו כאן בהמשך.</footer>
  </main>
</body>
</html>
